<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>AdMinterz — Profile</title>
<meta name="robots" content="noindex"/>
<meta name="monetag" content="d55254b1a71d7e658159a960af6adfd6"/>
<script async src="https://alwingulla.com/88/tag.min.js" data-zone="d55254b1a71d7e658159a960af6adfd6" onerror="console.warn('Monetag: ad blocked or unavailable')"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app">
  <div class="app-header">
    <button class="header-icon" onclick="history.back()">
      <i class="ti ti-arrow-left" style="color:var(--text);font-size:20px"></i>
    </button>
    <span class="header-logo">Profile</span>
    <div style="width:36px"></div>
  </div>
  <div class="scrollable" style="padding:16px">

    <div style="text-align:center;margin-bottom:26px;padding-top:14px">
      <div style="width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--mint));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:26px;font-weight:800;color:white;margin:0 auto 13px;box-shadow:0 0 0 4px rgba(14,165,233,0.18)">JD</div>
      <div style="font-family:var(--font-display);font-size:20px;font-weight:800;letter-spacing:-0.3px">John Doe</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px">john@adminterz.app</div>
      <div style="display:inline-flex;align-items:center;gap:5px;background:rgba(16,185,129,0.12);color:var(--mint2);font-size:11px;font-weight:700;padding:4px 13px;border-radius:20px;margin-top:9px;font-family:var(--font-display);border:0.5px solid rgba(16,185,129,0.2)">
        <i class="ti ti-star"></i> Starter Member
      </div>
    </div>

    <div style="background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);padding:16px;margin-bottom:16px">
      <div style="font-family:var(--font-display);font-size:10px;font-weight:700;margin-bottom:13px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase">ACCOUNT DETAILS</div>
      <div class="info-row"><span class="lbl">Member since</span><span class="val">May 2026</span></div>
      <div class="info-row"><span class="lbl">Plan</span><span class="val" style="color:var(--mint2)">Starter</span></div>
      <div class="info-row"><span class="lbl">Total ads watched</span><span class="val">247</span></div>
      <div class="info-row"><span class="lbl">Total earned</span><span class="val" style="color:var(--gold2)">12,450 pts</span></div>
      <div class="info-row"><span class="lbl">Total withdrawn</span><span class="val" style="color:var(--accent2)">$9.50</span></div>
      <div class="info-row"><span class="lbl">Referrals</span><span class="val">3</span></div>
    </div>

    <div style="background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);padding:4px 8px;margin-bottom:16px">
      <button class="sidebar-link"><i class="ti ti-edit"></i>Edit profile</button>
      <button class="sidebar-link"><i class="ti ti-lock"></i>Change password</button>
      <button class="sidebar-link"><i class="ti ti-bell"></i>Notifications</button>
      <button class="sidebar-link" onclick="window.location='contact.html'"><i class="ti ti-help-circle"></i>Support</button>
      <button class="sidebar-link" style="color:var(--danger)" onclick="window.location='login.html'">
        <i class="ti ti-logout" style="color:var(--danger)"></i>Log out
      </button>
    </div>
  </div>
</div>
</body>
</html>
